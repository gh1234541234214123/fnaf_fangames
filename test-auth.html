<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXEL AUTH</title>
  <link rel="stylesheet" href="retro-pixel.css">
  <style>
    .auth-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
    }
    .auth-toggle .pixel-button {
      flex: 1;
      border-radius: 0;
      opacity: 0.5;
    }
    .auth-toggle .pixel-button.active {
      opacity: 1;
      border-bottom-width: 2px;
      border-right-width: 2px;
      transform: translate(2px, 4px);
    }
    .auth-section { display: none; }
    .auth-section.active { display: block; }
    .profile-info { text-align: left; font-size: 0.55rem; line-height: 2; }
    .profile-info strong { color: #e94560; }
    .error-msg { color: #e94560; font-size: 0.5rem; margin-top: 0.5rem; display: none; }
    .success-msg { color: #00ff88; font-size: 0.5rem; margin-top: 0.5rem; display: none; }
    .pixel-box.auth-card {
      max-width: 400px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="pixel-title">
    ╔══════════════╗<br>
    ║ PIXEL  AUTH  ║<br>
    ╚══════════════╝
  </div>

  <div id="auth-section" class="pixel-box auth-card">
    <div class="auth-toggle">
      <button class="pixel-button gold active" data-tab="login">> LOGIN</button>
      <button class="pixel-button gold" data-tab="signup">> SIGNUP</button>
    </div>

    <div id="login-form" class="auth-section active">
      <p style="font-size:0.5rem;color:#aaa;margin-bottom:1rem">_ AUTHENTICATE _</p>
      <input class="pixel-input" id="login-email" type="email" placeholder="EMAIL" style="width:100%;margin-bottom:0.8rem">
      <input class="pixel-input" id="login-password" type="password" placeholder="PASSWORD" style="width:100%;margin-bottom:1rem">
      <button class="pixel-button gold" id="login-btn" style="width:100%">> ENTER</button>
      <div class="error-msg" id="login-error"></div>
      <div class="success-msg" id="login-success"></div>
    </div>

    <div id="signup-form" class="auth-section">
      <p style="font-size:0.5rem;color:#aaa;margin-bottom:1rem">_ REGISTER _</p>
      <input class="pixel-input" id="signup-email" type="email" placeholder="EMAIL" style="width:100%;margin-bottom:0.8rem">
      <input class="pixel-input" id="signup-password" type="password" placeholder="PASSWORD" style="width:100%;margin-bottom:0.8rem">
      <input class="pixel-input" id="signup-confirm" type="password" placeholder="CONFIRM" style="width:100%;margin-bottom:1rem">
      <button class="pixel-button gold" id="signup-btn" style="width:100%">> JOIN</button>
      <div class="error-msg" id="signup-error"></div>
      <div class="success-msg" id="signup-success"></div>
    </div>
  </div>

  <div id="profile-section" class="pixel-box gold auth-card" style="display:none">
    <p style="font-size:0.5rem;color:#ffd700;margin-bottom:1rem">_ ACCESS GRANTED _</p>
    <div class="pixel-card profile-info" style="max-width:100%;margin-bottom:1rem">
      <p><strong>> UID  :</strong> <span id="user-id">—</span></p>
      <p><strong>> EMAIL:</strong> <span id="user-email">—</span></p>
      <p><strong>> ROLE :</strong> <span id="user-role">—</span></p>
    </div>
    <button class="pixel-button" id="logout-btn" style="width:100%">> LOGOUT</button>
    <div class="error-msg" id="logout-error"></div>
  </div>

  <hr class="pixel-hr">

  <script>
    const SUPABASE_URL = 'https://pnsypgbbwfnufjxlgxoz.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ZhUYyRuH5pPwXFhVl2eV1g_8tyPqGix';

    const $ = id => document.getElementById(id);
    const show = el => el.style.display = '';
    const hide = el => el.style.display = 'none';
    const setError = (id, msg) => { const e = $(id); e.textContent = '> ERROR: ' + msg; e.style.display = ''; };
    const setSuccess = (id, msg) => { const s = $(id); s.textContent = '> ' + msg; s.style.display = ''; };
    const clearMsg = id => { const el = $(id); el.style.display = 'none'; el.textContent = ''; };

    // Tab switching
    document.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.auth-section').forEach(s => s.classList.remove('active'));
        $(btn.dataset.tab + '-form').classList.add('active');
        ['login', 'signup'].forEach(t => { clearMsg(t + '-error'); clearMsg(t + '-success'); });
      });
    });

    // Supabase REST helpers
    async function supabaseAuth(endpoint, body) {
      const res = await fetch(SUPABASE_URL + '/auth/v1/' + endpoint, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error_description || data.error || data.msg || 'Request failed');
      return data;
    }

    async function supabaseGetUser(token) {
      const res = await fetch(SUPABASE_URL + '/auth/v1/user', {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + token
        }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error_description || data.error || 'Failed to get user');
      return data;
    }

    // Signup
    $('signup-btn').addEventListener('click', async () => {
      clearMsg('signup-error');
      clearMsg('signup-success');
      const email = $('signup-email').value.trim();
      const password = $('signup-password').value;
      const confirm = $('signup-confirm').value;
      if (!email || !password) return setError('signup-error', 'FILL ALL FIELDS');
      if (password !== confirm) return setError('signup-error', 'PASSWORDS MISMATCH');
      if (password.length < 6) return setError('signup-error', 'PASSWORD TOO SHORT (6+)');
      try {
        await supabaseAuth('signup', { email, password });
        setSuccess('signup-success', 'CHECK YOUR EMAIL FOR CONFIRMATION');
        $('signup-email').value = '';
        $('signup-password').value = '';
        $('signup-confirm').value = '';
      } catch (e) {
        setError('signup-error', e.message);
      }
    });

    // Login
    $('login-btn').addEventListener('click', async () => {
      clearMsg('login-error');
      clearMsg('login-success');
      const email = $('login-email').value.trim();
      const password = $('login-password').value;
      if (!email || !password) return setError('login-error', 'FILL ALL FIELDS');
      try {
        const data = await supabaseAuth('token?grant_type=password', { email, password });
        localStorage.setItem('supabase_token', data.access_token);
        renderProfile(data.access_token);
      } catch (e) {
        setError('login-error', e.message);
      }
    });

    // Logout
    $('logout-btn').addEventListener('click', async () => {
      clearMsg('logout-error');
      const token = localStorage.getItem('supabase_token');
      if (!token) return;
      try {
        await fetch(SUPABASE_URL + '/auth/v1/logout', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + token
          }
        });
      } catch (_) {}
      localStorage.removeItem('supabase_token');
      show($('auth-section'));
      hide($('profile-section'));
    });

    // Render profile
    async function renderProfile(token) {
      try {
        const user = await supabaseGetUser(token);
        $('user-id').textContent = user.id;
        $('user-email').textContent = user.email;
        $('user-role').textContent = user.role || 'authenticated';
        hide($('auth-section'));
        show($('profile-section'));
        $('login-email').value = '';
        $('login-password').value = '';
      } catch (e) {
        localStorage.removeItem('supabase_token');
        setError('login-error', e.message);
      }
    }

    // Auto-restore session on load
    (async () => {
      const token = localStorage.getItem('supabase_token');
      if (token) await renderProfile(token);
    })();
  </script>
</body>
</html>
