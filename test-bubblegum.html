<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bubblegum Test</title>
  <link rel="stylesheet" href="bubblegum.css">
</head>
<body>
  <div class="bubble-title">Bubblegum!</div>

  <div class="bubble-grid">
    <div class="bubble-box">🍭 Sweet!</div>
    <div class="bubble-box sweet">🍬 Sugar!</div>
  </div>

  <div class="bubble-sprinkles">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="bubble-grid">
    <button class="bubble-button">🌸 Pink</button>
    <button class="bubble-button mint">🌿 Mint</button>
    <button class="bubble-button lemon">🍋 Lemon</button>
    <button class="bubble-button blueberry">🫐 Berry</button>
  </div>

  <input class="bubble-input" type="text" placeholder="say something sweet...">

  <div class="bubble-grid">
    <div class="bubble-card">
      <h2>🍦 Frosting</h2>
      <p>Fluffy clouds of buttercream happiness swirled into perfection.</p>
    </div>
    <div class="bubble-card">
      <h2>🧁 Sprinkle</h2>
      <p>A party of color bursting with every bite-sized moment of joy.</p>
    </div>
    <div class="bubble-card">
      <h2>🍫 Cocoa</h2>
      <p>Warm, melty goodness that hugs your soul like a cozy blanket.</p>
    </div>
  </div>
</body>
</html>
