<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartoon Pop Test</title>
  <link rel="stylesheet" href="cartoon-pop.css">
</head>
<body>
  <div class="cartoon-title">Cartoon Chaos!</div>

  <div class="cartoon-grid">
    <div class="cartoon-box">BOING!</div>
    <div class="cartoon-box">POW!</div>
  </div>

  <div class="cartoon-grid">
    <button class="cartoon-button">Zap!</button>
    <button class="cartoon-button blue">Splash!</button>
    <button class="cartoon-button yellow">Bam!</button>
    <button class="cartoon-button purple">Boing!</button>
  </div>

  <input class="cartoon-input" type="text" placeholder="type something silly...">

  <div class="cartoon-grid">
    <div class="cartoon-card">
      <h2>Wacky Widget</h2>
      <p>This widget does absolutely nothing and looks fabulous doing it.</p>
      <br>
      <span class="cartoon-badge">★ FUN</span>
    </div>
    <div class="cartoon-card">
      <h2>Goofy Gadget</h2>
      <p>Warning: excessive sillyness may cause spontaneous giggles.</p>
      <br>
      <span class="cartoon-badge pink">★ WOW</span>
    </div>
    <div class="cartoon-card">
      <h2>Bonkers Box</h2>
      <p>Contents: 100% pure unfiltered tomfoolery and hi-jinks.</p>
      <br>
      <span class="cartoon-badge green">★ ZANY</span>
    </div>
  </div>
</body>
</html>
