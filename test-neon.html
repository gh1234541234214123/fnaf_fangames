<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Glow Test</title>
  <link rel="stylesheet" href="neon-glow.css">
</head>
<body>
  <div class="neon-box">Neon Nights</div>

  <div class="neon-grid">
    <div class="neon-box pink">Pink Pulse</div>
    <div class="neon-box yellow">Yellow Fever</div>
  </div>

  <div class="neon-grid">
    <button class="neon-button">Green</button>
    <button class="neon-button pink">Pink</button>
    <button class="neon-button blue">Blue</button>
  </div>

  <input class="neon-input" type="text" placeholder="type here...">

  <div class="neon-grid">
    <div class="neon-card">
      <h2>★ CYBER</h2>
      <p>Neon dreams and laser beams cut through the void of digital space.</p>
    </div>
    <div class="neon-card">
      <h2>★ WAVE</h2>
      <p>Riding the electric tide through a sea of phosphorescent light.</p>
    </div>
    <div class="neon-card">
      <h2>★ PULSE</h2>
      <p>The rhythm of the grid beats in time with the glowing city.</p>
    </div>
  </div>
</body>
</html>
